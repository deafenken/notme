<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div id="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">…</span>
    </div>
    <button id="refresh">Refresh</button>
  </header>

  <section class="card">
    <div class="row"><span>Exit IP</span><b id="ip">—</b></div>
    <div class="row"><span>IP location</span><b id="ipLoc">—</b></div>
    <div class="row"><span>ISP</span><b id="isp"></b></div>
    <div class="row"><span>Spoofed address</span><b id="addr">—</b></div>
    <div class="row"><span>Coordinates</span><b id="coords">—</b></div>
    <div class="row"><span>Source</span><b id="source"></b></div>
    <div class="row"><span>Spoofed timezone</span><b id="tz">—</b></div>
    <div class="row"><span>Spoofed language</span><b id="lang">—</b></div>
    <div class="row"><span>Updated</span><b id="updated">never</b></div>
  </section>

  <section class="card toggles">
    <label class="toggle">
      <span>Location spoof</span>
      <input type="checkbox" id="enabled" />
      <span class="switch"></span>
    </label>
    <label class="toggle">
      <span>Timezone spoof</span>
      <input type="checkbox" id="tzEnabled" />
      <span class="switch"></span>
    </label>
    <label class="toggle">
      <span>Language spoof</span>
      <input type="checkbox" id="langEnabled" />
      <span class="switch"></span>
    </label>
  </section>

  <section class="card">
    <div class="row"><label for="accuracyM">Accuracy (m)</label><input type="number" id="accuracyM" min="5" max="500" /></div>
    <div class="row"><label for="refreshMinutes">Refresh (min)</label><input type="number" id="refreshMinutes" min="30" max="10080" /></div>
    <div class="row"><label for="ipToken">ipinfo.io token (optional)</label><input type="text" id="ipToken" /></div>
  </section>

  <footer>
    <a href="https://github.com/Azurboy/geomirror" target="_blank" rel="noopener">GeoMirror</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
